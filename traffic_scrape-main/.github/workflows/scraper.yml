name: Almaty Traffic Scraper

on:
  schedule:
    - cron: "0 * * * *"    # every hour at :00
    - cron: "30 * * * *"   # every hour at :30
  workflow_dispatch:           # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write          # needed to push CSV back to repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: python scraper.py

      - name: Commit updated CSV
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/traffic_data.csv data/geocode_cache.json
          git diff --cached --quiet || git commit -m "data: $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
